<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe details | CrumBloom</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="styles/Header.css" />
    <script src="components/Header.js" type="module"></script>
    <script src="app.js" type="module"></script>
  </head>
  <body>
    <site-header></site-header>
    <main class="page-shell details-page">
      <section
        data-recipe-details
        aria-live="polite"
        aria-busy="true"
      ></section>
      <section
        class="related-recipes"
        data-related-recipes
        aria-labelledby="related-title"
        hidden
      >
        <h2 id="related-title">Recipes from the same category ></h2>
        <div class="recipe-grid compact-grid" data-related-grid></div>
      </section>
    </main>
    <site-panels></site-panels>
  </body>
</html>
