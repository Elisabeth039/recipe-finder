<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrumBloom | Recipe finder</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="styles/Header.css" />
    <script src="components/Header.js" type="module"></script>
    <script src="app.js" type="module"></script>
  </head>
  <body>
    <site-header></site-header>

    <main class="page-shell">
      <section class="search-controls" aria-label="Find recipes">
        <div class="filter-group">
          <label for="area-filter">Filters:</label>
          <select id="area-filter" name="area">
            <option value="">Country / area</option>
          </select>
          <select id="category-filter" name="category">
            <option value="">Category</option>
          </select>
          <button
            class="shuffle-button"
            type="button"
            aria-label="Shuffle recipes"
            title="Shuffle recipes"
          >
            ⤨
          </button>
          <button
            class="alphabetize-button"
            type="button"
            aria-label="Sort recipes from A to Z"
            title="Sort recipes from A to Z"
          >
            A-Z
          </button>
        </div>
        <form class="search-form">
          <label class="sr-only" for="recipe-search">Search recipes</label>
          <input
            id="recipe-search"
            type="search"
            placeholder="Search recipes..."
          />
          <button type="submit">Search</button>
        </form>
      </section>

      <p class="status-message" aria-live="polite"></p>
      <section
        class="recipe-grid"
        data-home-recipes
        aria-label="Recipes"
      ></section>
      <nav class="pagination" aria-label="Recipe pages" hidden></nav>
    </main>

    <div class="backdrop" hidden></div>
    <aside
      class="side-panel"
      id="favorites-panel"
      aria-labelledby="favorites-title"
      aria-hidden="true"
    >
      <div class="panel-heading">
        <h2 id="favorites-title">Favorites</h2>
        <button class="close-button" type="button" aria-label="Close favorites">
          ×
        </button>
      </div>
      <p>No favorite recipes here yet.</p>
    </aside>
    <aside
      class="side-panel"
      id="about-panel"
      aria-labelledby="about-title"
      aria-hidden="true"
    >
      <div class="panel-heading">
        <h2 id="about-title">About CrumBloom</h2>
        <button
          class="close-button"
          type="button"
          aria-label="Close about panel"
        >
          ×
        </button>
      </div>
      <p>
        CrumBloom is a quiet place to discover recipes from around the world.
      </p>
    </aside>
  </body>
</html>
